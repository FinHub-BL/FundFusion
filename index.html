<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FundFusion - The Ultimate Blueprint System</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Google Fonts: Orbitron for Numbers, Prompt for Thai -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --theme-color: #3b82f6; /* Default Blue */
            --theme-glow: rgba(59, 130, 246, 0.5);
            --bg-main: #03050a;
            --bg-card: #0a0e17;
        }

        body { 
            font-family: 'Prompt', sans-serif; 
            background-color: var(--bg-main); 
            color: #F3F4F6; 
            overflow-x: hidden;
        }

        .font-num { font-family: 'Orbitron', sans-serif; }

        /* Premium Glass & Backgrounds */
        .glass-panel {
            background: rgba(10, 14, 23, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .bg-grid-pattern {
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Dynamic Neon Glow System */
        .neon-glow {
            box-shadow: 0 0 20px var(--theme-glow), inset 0 0 10px var(--theme-glow);
            border-color: var(--theme-color) !important;
        }
        
        .neon-text {
            text-shadow: 0 0 10px var(--theme-glow);
            color: var(--theme-color);
        }

        .neon-border { border: 1px solid var(--theme-color); }
        
        /* Advanced Graph Animations */
        .live-chart-line {
            fill: none;
            stroke: var(--theme-color);
            stroke-width: 3;
            filter: drop-shadow(0 0 8px var(--theme-color));
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: d 0.5s cubic-bezier(0.4, 0, 0.2, 1); /* Smooth movement */
        }

        .chart-gradient-fill {
            transition: d 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(2); opacity: 0; }
        }

        .live-indicator::before {
            content: '';
            position: absolute;
            left: -4px; top: -4px; right: -4px; bottom: -4px;
            border-radius: 50%;
            background-color: var(--theme-color);
            animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        /* Terminal & Mining Effects */
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .scan-effect::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, transparent, var(--theme-glow), transparent);
            opacity: 0.1;
            animation: scanline 3s linear infinite;
            pointer-events: none;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #03050a; }
        ::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--theme-color); }
    </style>
</head>
<body class="bg-grid-pattern min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // ฐานข้อมูลสินทรัพย์ (Master Asset Data)
        const INITIAL_ASSETS = [
            { id: 'btc', name: 'Bitcoin', symbol: 'BTC', basePrice: 65000, type: 'crypto' },
            { id: 'eth', name: 'Ethereum', symbol: 'ETH', basePrice: 3500, type: 'crypto' },
            { id: 'sol', name: 'Solana', symbol: 'SOL', basePrice: 145, type: 'crypto' },
            { id: 'gold', name: 'Gold Ounce', symbol: 'XAU', basePrice: 2350, type: 'commodity' },
        ];

        // ธีมสีทั้งหมดของระบบ
        const THEMES = {
            blue: { hex: '#3b82f6', glow: 'rgba(59, 130, 246, 0.5)', name: 'Neon Blue' },
            emerald: { hex: '#10b981', glow: 'rgba(16, 185, 129, 0.5)', name: 'Emerald Green' },
            gold: { hex: '#f59e0b', glow: 'rgba(245, 158, 11, 0.5)', name: 'Royal Gold' },
            purple: { hex: '#a855f7', glow: 'rgba(168, 85, 247, 0.5)', name: 'Cyber Purple' },
            crimson: { hex: '#ef4444', glow: 'rgba(239, 68, 68, 0.5)', name: 'Crimson Red' }
        };

        function App() {
            // ==========================================
            // STATE MANAGEMENT (ระบบจัดการสถานะทั้งหมด)
            // ==========================================
            const [user, setUser] = useState(null); 
            const [currentPage, setCurrentPage] = useState('auth'); 
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [activeTheme, setActiveTheme] = useState('blue');
            
            // ตลาด Live Data
            const [marketPrices, setMarketPrices] = useState({});
            const [chartData, setChartData] = useState(Array(20).fill(100)); // ข้อมูลกราฟ 20 จุด
            
            // กระเป๋าเงินและสินทรัพย์
            const [wallet, setWallet] = useState({
                deposited: 5000, 
                tradeBalance: 1500,
                assetsHoldings: { btc: 0.1, eth: 2, gold: 0 },
                history: []
            });

            // ตั๋วออร์เดอร์
            const [orders, setOrders] = useState([]);
            const [selectedAsset, setSelectedAsset] = useState(INITIAL_ASSETS[0]);
            
            // ระบบ Membership & ขุดเหรียญ
            const [membershipLevel, setMembershipLevel] = useState(1); 
            const [miningPool, setMiningPool] = useState({ active: false, assetId: '', progress: 0, hashes: 0 });

            // UI States
            const [authMode, setAuthMode] = useState('login'); 
            const [depositModal, setDepositModal] = useState(false);
            const [withdrawModal, setWithdrawModal] = useState(false);
            const [txAmount, setTxAmount] = useState('');

            // ==========================================
            // EFFECTS & ENGINE LOOPS (ลูปการทำงานเบื้องหลัง)
            // ==========================================
            
            // 1. อัปเดตไอคอน Lucide ทุกครั้งที่เรนเดอร์
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });

            // 2. เปลี่ยนตัวแปร CSS ของระบบตามธีมที่เลือก
            useEffect(() => {
                const root = document.documentElement;
                root.style.setProperty('--theme-color', THEMES[activeTheme].hex);
                root.style.setProperty('--theme-glow', THEMES[activeTheme].glow);
            }, [activeTheme]);

            // 3. Engine สร้างความผันผวนของราคาสินทรัพย์จำลองแบบ Real-time
            useEffect(() => {
                const priceInterval = setInterval(() => {
                    const newPrices = {};
                    INITIAL_ASSETS.forEach(asset => {
                        const current = marketPrices[asset.id] || asset.basePrice;
                        const volatility = current * 0.001; // ผันผวน 0.1% ต่อวิ
                        const change = (Math.random() - 0.5) * volatility;
                        newPrices[asset.id] = current + change;
                    });
                    setMarketPrices(newPrices);
                }, 1000);
                return () => clearInterval(priceInterval);
            }, [marketPrices]);

            // 4. Engine สร้างจุดกราฟ (Live Graph Generator)
            useEffect(() => {
                const chartInterval = setInterval(() => {
                    setChartData(prev => {
                        const lastPoint = prev[prev.length - 1];
                        const randomMove = (Math.random() - 0.5) * 5;
                        const newPoint = lastPoint + randomMove;
                        // เลื่อนอาเรย์ไปทางซ้าย และเพิ่มจุดใหม่
                        return [...prev.slice(1), newPoint];
                    });
                }, 1500); // ขยับกราฟทุกๆ 1.5 วินาที
                return () => clearInterval(chartInterval);
            }, []);

            // 5. Engine ระบบขุดเหรียญ 24 ชั่วโมง
            useEffect(() => {
                let miningTimer;
                if (miningPool.active) {
                    miningTimer = setInterval(() => {
                        setMiningPool(prev => {
                            if (prev.progress >= 100) {
                                // ขุดเสร็จสิ้น ให้รางวัล
                                const rewardMap = { 1: 0.05, 2: 0.1, 3: 0.2, 4: 0.5 };
                                const rewardUSD = (rewardMap[membershipLevel] || 0.01) * 100;
                                const assetPrice = marketPrices[prev.assetId] || INITIAL_ASSETS.find(a=>a.id===prev.assetId).basePrice;
                                const rewardCrypto = rewardUSD / assetPrice;
                                
                                setWallet(w => ({
                                    ...w,
                                    assetsHoldings: { ...w.assetsHoldings, [prev.assetId]: (w.assetsHoldings[prev.assetId] || 0) + rewardCrypto },
                                    history: [{ id: Date.now(), type: 'MINING_REWARD', amount: rewardUSD, date: new Date().toLocaleString() }, ...w.history]
                                }));
                                alert(`🎉 ขุดสำเร็จ! ได้รับ ${prev.assetId.toUpperCase()} มูลค่าประมาณ $${rewardUSD}`);
                                return { active: false, assetId: '', progress: 0, hashes: 0 };
                            }
                            return { 
                                ...prev, 
                                progress: prev.progress + (Math.random() * 5), 
                                hashes: prev.hashes + Math.floor(Math.random() * 500) 
                            };
                        });
                    }, 1000);
                }
                return () => clearInterval(miningTimer);
            }, [miningPool.active, membershipLevel, marketPrices]);

            // ==========================================
            // HELPER FUNCTIONS (ฟังก์ชันคำนวณและช่วยเหลือ)
            // ==========================================
            const formatMoney = (val) => val.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            const formatCrypto = (val) => val.toLocaleString('en-US', { minimumFractionDigits: 4, maximumFractionDigits: 6 });

            const currentSelectedPrice = marketPrices[selectedAsset.id] || selectedAsset.basePrice;

            // คำนวณมูลค่าพอร์ตทั้งหมด
            const totalAssetValue = useMemo(() => {
                return Object.keys(wallet.assetsHoldings).reduce((sum, key) => {
                    const price = marketPrices[key] || INITIAL_ASSETS.find(a => a.id === key).basePrice;
                    return sum + (wallet.assetsHoldings[key] * price);
                }, 0);
            }, [wallet.assetsHoldings, marketPrices]);

            const totalNetWorth = wallet.deposited + wallet.tradeBalance + totalAssetValue;

            // ตรรกะระบบล็อกพอร์ต (Asset Lock Conditions)
            const lockConditions = [
                { level: 1, min: 5000 },
                { level: 2, min: 50000 },
                { level: 3, min: 750000 },
                { level: 4, min: 10000000 }
            ];
            const isAssetLocked = useMemo(() => {
                if (membershipLevel === 0) return false;
                const req = lockConditions.find(c => c.level === membershipLevel)?.min || 0;
                return totalNetWorth < req;
            }, [membershipLevel, totalNetWorth]);

            // ฟังก์ชันวาดเส้นกราฟ SVG
            const generateSvgPath = () => {
                const max = Math.max(...chartData) + 2;
                const min = Math.min(...chartData) - 2;
                const range = max - min || 1;
                
                const points = chartData.map((val, i) => {
                    const x = (i / (chartData.length - 1)) * 100;
                    const y = 100 - ((val - min) / range) * 100;
                    return `${x},${y}`;
                });
                
                const linePath = `M ${points.join(' L ')}`;
                const fillPath = `${linePath} L 100,100 L 0,100 Z`;
                
                return { linePath, fillPath, max, min };
            };

            const svgData = generateSvgPath();

            // การจัดการฟอร์มและระบบเงิน
            const handleTransaction = (type) => {
                const amt = parseFloat(txAmount);
                if (isNaN(amt) || amt <= 0) return alert("กรุณาระบุจำนวนเงินที่ถูกต้อง");

                if (type === 'DEPOSIT') {
                    setWallet(w => ({
                        ...w,
                        deposited: w.deposited + amt,
                        history: [{ id: Date.now(), type: 'DEPOSIT', amount: amt, date: new Date().toLocaleString() }, ...w.history]
                    }));
                    setDepositModal(false);
                    alert(`✅ นำฝากเงินเข้าระบบเรียบร้อย: $${formatMoney(amt)}`);
                } else {
                    if (w.deposited < amt) return alert("❌ ยอดเงินฝากหลักมีไม่พอให้ถอน");
                    setWallet(w => ({
                        ...w,
                        deposited: w.deposited - amt,
                        history: [{ id: Date.now(), type: 'WITHDRAW', amount: amt, date: new Date().toLocaleString() }, ...w.history]
                    }));
                    setWithdrawModal(false);
                    alert(`📤 ถอนเงินออกจากระบบเรียบร้อย: $${formatMoney(amt)}`);
                }
                setTxAmount('');
            };

            // ==========================================
            // RENDER UI (ส่วนหน้าตาแอปพลิเคชัน)
            // ==========================================
            return (
                <div className="flex flex-col h-screen max-w-lg mx-auto bg-[#03050a] relative shadow-2xl border-x border-gray-800/50">
                    
                    {/* --- HEADER NAVIGATION --- */}
                    {currentPage !== 'auth' && (
                        <header className="glass-panel sticky top-0 z-40 p-4 flex justify-between items-center border-b border-white/10">
                            <button onClick={() => setSidebarOpen(true)} className="p-2 rounded-xl bg-white/5 hover:bg-white/10 transition neon-border">
                                <i data-lucide="menu" className="w-5 h-5 neon-text"></i>
                            </button>
                            <div className="text-center">
                                <h1 className="text-xl font-bold tracking-widest neon-text" style={{textShadow: `0 0 15px ${THEMES[activeTheme].glow}`}}>
                                    FUNDFUSION
                                </h1>
                                <p className="text-[10px] text-gray-400 font-num tracking-widest">BLUEPRINT V.MAX</p>
                            </div>
                            <div className="flex items-center gap-1.5 glass-panel px-3 py-1.5 rounded-full border border-white/10 shadow-lg">
                                <i data-lucide="shield-check" className="w-4 h-4 neon-text"></i>
                                <span className="text-xs font-bold font-num neon-text">LV.{membershipLevel}</span>
                            </div>
                        </header>
                    )}

                    {/* --- SIDEBAR MENU --- */}
                    {sidebarOpen && (
                        <div className="fixed inset-0 z-50 flex">
                            <div className="absolute inset-0 bg-black/80 backdrop-blur-sm" onClick={() => setSidebarOpen(false)}></div>
                            <div className="w-80 glass-panel h-full border-r border-white/10 p-6 flex flex-col justify-between relative shadow-2xl transform transition-transform">
                                <div>
                                    <div className="flex justify-between items-start mb-8">
                                        <div className="flex items-center gap-4">
                                            <div className="w-14 h-14 rounded-full border-2 neon-border flex items-center justify-center bg-black/50 overflow-hidden shadow-lg neon-glow">
                                                <i data-lucide="user" className="w-6 h-6 neon-text"></i>
                                            </div>
                                            <div>
                                                <h4 className="font-bold text-lg text-white">{user?.name || 'Administrator'}</h4>
                                                <p className="text-xs text-gray-400 font-num">UID: {user?.uid || '89304918'}</p>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="space-y-6">
                                        {/* Membership Control */}
                                        <div className="space-y-2">
                                            <label className="text-xs font-bold text-gray-400 tracking-wider flex items-center gap-2">
                                                <i data-lucide="award" className="w-4 h-4"></i> ระบบระดับบัญชี (VIP Status)
                                            </label>
                                            <select 
                                                value={membershipLevel} 
                                                onChange={(e) => setMembershipLevel(Number(e.target.value))} 
                                                className="w-full bg-black/50 text-sm text-white rounded-xl p-3 border border-white/10 outline-none focus:border-[var(--theme-color)] transition"
                                            >
                                                <option value={0}>Level 0 - อิสระ (ไม่ล็อกพอร์ต)</option>
                                                <option value={1}>Level 1 - ล็อกขั้นต่ำ $5,000</option>
                                                <option value={2}>Level 2 - ล็อกขั้นต่ำ $50,000</option>
                                                <option value={3}>Level 3 - ล็อกขั้นต่ำ $750,000</option>
                                                <option value={4}>Level 4 - ล็อกขั้นต่ำ $10M+</option>
                                            </select>
                                        </div>

                                        {/* Theme Selector */}
                                        <div className="space-y-3 pt-4 border-t border-white/10">
                                            <label className="text-xs font-bold text-gray-400 tracking-wider flex items-center gap-2">
                                                <i data-lucide="palette" className="w-4 h-4"></i> เลือกสีสันระบบ (Theme Engine)
                                            </label>
                                            <div className="grid grid-cols-5 gap-2">
                                                {Object.entries(THEMES).map(([key, theme]) => (
                                                    <button 
                                                        key={key} 
                                                        onClick={() => setActiveTheme(key)}
                                                        title={theme.name}
                                                        className={`h-10 rounded-xl border-2 transition-all duration-300 ${activeTheme === key ? 'scale-110 shadow-lg' : 'border-transparent hover:scale-105'}`}
                                                        style={{ backgroundColor: theme.hex, borderColor: activeTheme === key ? '#fff' : 'transparent', boxShadow: activeTheme === key ? `0 0 15px ${theme.glow}` : 'none' }}
                                                    ></button>
                                                ))}
                                            </div>
                                            <p className="text-center text-xs text-gray-500 mt-2">Active: {THEMES[activeTheme].name}</p>
                                        </div>
                                    </div>
                                </div>

                                <button onClick={() => { setUser(null); setCurrentPage('auth'); setSidebarOpen(false); }} className="flex items-center justify-center gap-2 bg-red-500/10 hover:bg-red-500/20 text-red-500 py-4 rounded-2xl border border-red-500/30 transition w-full font-bold">
                                    <i data-lucide="power" className="w-5 h-5"></i> ตัดการเชื่อมต่อระบบ
                                </button>
                            </div>
                        </div>
                    )}

                    {/* --- MAIN CONTENT AREA --- */}
                    <main className="flex-1 overflow-y-auto p-4 pb-28">
                        
                        {/* 0. AUTHENTICATION */}
                        {currentPage === 'auth' && (
                            <div className="flex flex-col items-center justify-center min-h-[80vh]">
                                <div className="w-24 h-24 rounded-3xl bg-white/5 border border-white/10 flex items-center justify-center mb-6 neon-glow relative">
                                    <i data-lucide="hexagon" className="w-12 h-12 neon-text absolute animate-spin" style={{animationDuration: '10s'}}></i>
                                    <i data-lucide="zap" className="w-8 h-8 text-white z-10"></i>
                                </div>
                                <h1 className="text-4xl font-black mb-2 text-white tracking-widest text-center">FUND<span className="neon-text">FUSION</span></h1>
                                <p className="text-gray-400 mb-10 font-num tracking-widest text-xs">V.MAX - ENTERPRISE BLUEPRINT</p>

                                <div className="w-full glass-panel p-6 rounded-3xl neon-border shadow-2xl relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-[var(--theme-color)] to-transparent opacity-50"></div>
                                    
                                    <form onSubmit={(e) => { e.preventDefault(); setUser({name: 'Master User', uid: '984532'}); setCurrentPage('dashboard'); }} className="space-y-4 relative z-10">
                                        <div>
                                            <label className="text-xs text-gray-400 mb-1 block">รหัสประจำตัว (ID / Email)</label>
                                            <input type="text" required defaultValue="admin@fusion.com" className="w-full bg-black/50 border border-white/10 rounded-xl p-3.5 text-white outline-none focus:border-[var(--theme-color)] transition" />
                                        </div>
                                        <div>
                                            <label className="text-xs text-gray-400 mb-1 block">รหัสผ่านระบบ (Password)</label>
                                            <input type="password" required defaultValue="password" className="w-full bg-black/50 border border-white/10 rounded-xl p-3.5 text-white outline-none focus:border-[var(--theme-color)] transition" />
                                        </div>
                                        <button type="submit" className="w-full py-4 rounded-xl font-bold text-white tracking-wider mt-4 transition-all hover:scale-[1.02] neon-glow" style={{backgroundColor: THEMES[activeTheme].hex}}>
                                            INITIATE SYSTEM
                                        </button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* 1. DASHBOARD (ภาพรวม + ระบบฝากถอนจริง) */}
                        {currentPage === 'dashboard' && (
                            <div className="space-y-6 animate-fade-in">
                                {/* Total Net Worth Card */}
                                <div className="glass-panel p-6 rounded-3xl relative overflow-hidden neon-border shadow-2xl">
                                    <div className="absolute -right-10 -top-10 w-40 h-40 bg-[var(--theme-color)] rounded-full blur-[80px] opacity-30"></div>
                                    
                                    <p className="text-xs text-gray-400 tracking-widest mb-2 flex items-center gap-2">
                                        <i data-lucide="globe" className="w-4 h-4 neon-text animate-pulse"></i> มูลค่าสินทรัพย์รวมสุทธิ
                                    </p>
                                    <h2 className="text-4xl font-black text-white font-num tracking-tight mb-6">
                                        $<span className="neon-text">{formatMoney(totalNetWorth)}</span>
                                    </h2>
                                    
                                    <div className="grid grid-cols-3 gap-3 border-t border-white/10 pt-4">
                                        <div className="bg-black/30 p-3 rounded-2xl border border-white/5">
                                            <span className="text-[10px] text-gray-500 block mb-1">ฝากหลัก (Main)</span>
                                            <span className="font-bold text-sm text-gray-200 font-num">${formatMoney(wallet.deposited)}</span>
                                        </div>
                                        <div className="bg-black/30 p-3 rounded-2xl border border-white/5">
                                            <span className="text-[10px] text-gray-500 block mb-1">เทรด (Margin)</span>
                                            <span className="font-bold text-sm font-num neon-text">${formatMoney(wallet.tradeBalance)}</span>
                                        </div>
                                        <div className="bg-black/30 p-3 rounded-2xl border border-white/5">
                                            <span className="text-[10px] text-gray-500 block mb-1">ถือครอง (Spot)</span>
                                            <span className="font-bold text-sm text-white font-num">${formatMoney(totalAssetValue)}</span>
                                        </div>
                                    </div>
                                </div>

                                {/* Transaction Buttons */}
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={() => setDepositModal(true)} className="glass-panel p-4 rounded-2xl flex flex-col items-center justify-center gap-2 hover:bg-white/5 transition neon-border group">

                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/80 backdrop-blur-md">
                            <div className="glass-panel w-full max-w-sm rounded-3xl p-6 border border-white/10 shadow-2xl transform scale-100 animate-fade-in relative">
                                <button onClick={() => setDepositModal(false)} className="absolute top-4 right-4 text-gray-500 hover:text-white"><i data-lucide="x"></i></button>
                                <h3 className="text-xl font-bold text-white mb-2 flex items-center gap-2"><i data-lucide="arrow-down-to-line" className="text-green-400"></i> ระบบฝากเงิน</h3>
                                <p className="text-xs text-gray-400 mb-6">กรอกจำนวนเงิน (USD) ที่ต้องการนำเข้าสู่ระบบเพื่อเทรดหรือซื้อสินทรัพย์</p>
                                
                                <input type="number" value={txAmount} onChange={e => setTxAmount(e.target.value)} placeholder="0.00" className="w-full bg-black/50 border border-white/10 rounded-2xl p-5 text-3xl font-num text-white text-center outline-none mb-6 focus:border-green-500 transition" />
                                
                                <button onClick={() => handleTransaction('DEPOSIT')} className="w-full bg-green-500 hover:bg-green-400 text-white font-bold py-4 rounded-xl transition shadow-[0_0_15px_rgba(34,197,94,0.4)]">
                                    ยืนยันทำรายการฝาก
                                </button>
                            </div>
                        </div>
                    )}

                    {/* --- WITHDRAW MODAL --- */}
                    {withdrawModal && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/80 backdrop-blur-md">
                            <div className="glass-panel w-full max-w-sm rounded-3xl p-6 border border-white/10 shadow-2xl transform scale-100 animate-fade-in relative">
                                <button onClick={() => setWithdrawModal(false)} className="absolute top-4 right-4 text-gray-500 hover:text-white"><i data-lucide="x"></i></button>
                                <h3 className="text-xl font-bold text-white mb-2 flex items-center gap-2"><i data-lucide="arrow-up-from-line" className="text-red-400"></i> ระบบถอนเงิน</h3>
                                <div className="bg-red-500/10 border border-red-500/20 p-3 rounded-xl mb-4">
                                    <p className="text-[10px] text-red-300">ยอดเงินคงเหลือที่ถอนได้: <span className="font-bold">${formatMoney(wallet.deposited)}</span></p>
                                </div>
                                
                                <input type="number" value={txAmount} onChange={e => setTxAmount(e.target.value)} placeholder="0.00" className="w-full bg-black/50 border border-white/10 rounded-2xl p-5 text-3xl font-num text-white text-center outline-none mb-6 focus:border-red-500 transition" />
                                
                                <button onClick={() => handleTransaction('WITHDRAW')} className="w-full bg-red-500 hover:bg-red-400 text-white font-bold py-4 rounded-xl transition shadow-[0_0_15px_rgba(239,68,68,0.4)]">
                                    ยืนยันทำรายการถอน
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
