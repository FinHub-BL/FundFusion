<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FundFusion - Grand Blueprint Edition</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #060913; color: #F3F4F6; }
        .premium-gradient { background: linear-gradient(135deg, #0f1424 0%, #060913 100%); }
        
        /* สไตล์สีสันหน้ากราฟและเอฟเฟกต์เรืองแสงตามธีม */
        .glow-blue { box-shadow: 0 0 25px rgba(59, 130, 246, 0.5); }
        .glow-emerald { box-shadow: 0 0 25px rgba(16, 185, 129, 0.5); }
        .glow-gold { box-shadow: 0 0 25px rgba(245, 158, 11, 0.5); }
        
        .chart-line-anim { stroke-dasharray: 6; animation: graphMove 40s linear infinite; }
        @keyframes graphMove { to { stroke-dashoffset: -1000; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const INITIAL_ASSETS = [
            { id: 'btc', name: 'Bitcoin', symbol: 'BTC', price: 65000, change: 2.4, type: 'crypto' },
            { id: 'eth', name: 'Ethereum', symbol: 'ETH', price: 3500, change: -1.2, type: 'crypto' },
            { id: 'gold', name: 'Gold Ounce', symbol: 'XAU', price: 2350, change: 0.8, type: 'commodity' },
        ];

        function App() {
            // ระบบผู้ใช้ & การนำทาง
            const [user, setUser] = useState(null); 
            const [currentPage, setCurrentPage] = useState('auth'); 
            const [hamburgerOpen, setHamburgerOpen] = useState(false);
            const [currency, setCurrency] = useState('USD'); 
            const [language, setLanguage] = useState('TH');
            
            // ฟังก์ชันเลือกสไตล์สีสันหน้ากราฟ (Theme Color Function)
            const [chartColorTheme, setChartColorTheme] = useState('blue'); // 'blue' | 'emerald' | 'gold'

            // ระบบกระเป๋าเงิน (Real Money Financial Blueprints)
            const [wallet, setWallet] = useState({
                deposited: 1500, 
                tradeBalance: 500,
                assetsHoldings: { btc: 0.05, eth: 0.5, gold: 1 } 
            });

            // ระบบประวัติและออร์เดอร์การเทรด
            const [orders, setOrders] = useState([
                { id: 1, asset: INITIAL_ASSETS[0], type: 'BUY', volume: 200, status: 'RUNNING' }
            ]);
            const [selectedAsset, setSelectedAsset] = useState(INITIAL_ASSETS[0]);
            
            // ระบบ Membership & Mining Loops
            const [membershipLevel, setMembershipLevel] = useState(1); 
            const [miningPool, setMiningPool] = useState({ assetId: '', amount: 0, timeLeft: 0, isMining: false });

            // ระบบลงทะเบียนและเข้าสู่ระบบ
            const [authMode, setAuthMode] = useState('login'); 
            const [regForm, setRegForm] = useState({ name: '', email: '', password: '', confirmPassword: '' });
            const [loginForm, setLoginForm] = useState({ email: '', password: '' });

            // คำนวณอัตราแลกเปลี่ยนสกุลเงิน
            const rate = currency === 'THB' ? 36.5 : 1;
            const curSign = currency === 'THB' ? '฿' : '$';
            const formatMoney = (val) => (val * rate).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });

            // คำนวณมูลค่าสินทรัพย์และยอดรวมพอร์ตทั้งหมด
            const totalAssetValue = useMemo(() => {
                return Object.keys(wallet.assetsHoldings).reduce((sum, key) => {
                    const asset = INITIAL_ASSETS.find(a => a.id === key);
                    return sum + (wallet.assetsHoldings[key] * (asset ? asset.price : 0));
                }, 0);
            }, [wallet.assetsHoldings]);

            const totalBalance = useMemo(() => {
                return wallet.tradeBalance + totalAssetValue + wallet.deposited;
            }, [wallet.tradeBalance, totalAssetValue, wallet.deposited]);

            // ระบบล็อกเหรียญอัตโนมัติตามระดับเลเวล (Asset Lock Logic)
            const isAssetLocked = useMemo(() => {
                if (membershipLevel === 0) return false;
                if (membershipLevel === 1 && totalAssetValue < 5000) return true;
                if (membershipLevel === 2 && totalAssetValue < 50000) return true;
                if (membershipLevel === 3 && totalAssetValue < 750000) return true;
                if (membershipLevel === 4 && totalAssetValue < 10000000) return true;
                return false; 
            }, [membershipLevel, totalAssetValue]);

            // ลูปทำงานระบบขุดเหรียญ 24 ชั่วโมงจำลอง
            useEffect(() => {
                let timer;
                if (miningPool.isMining && miningPool.timeLeft > 0) {
                    timer = setInterval(() => {
                        setMiningPool(prev => {
                            if (prev.timeLeft <= 1) {
                                clearInterval(timer);
                                const basePct = 0.01;
                                const bonusPct = membershipLevel === 1 ? 0.05 : membershipLevel === 2 ? 0.07 : membershipLevel === 3 ? 0.10 : membershipLevel === 4 ? 0.15 : 0;
                                const totalPct = basePct + bonusPct;
                                const rewardInCrypto = (prev.amount * totalPct) / INITIAL_ASSETS.find(a => a.id === prev.assetId).price;
                                
                                setWallet(w => ({
                                    ...w,
                                    assetsHoldings: { ...w.assetsHoldings, [prev.assetId]: w.assetsHoldings[prev.assetId] + rewardInCrypto }
                                }));
                                alert(`[พิมพ์เขียวระบบขุด] บันทึกสำเร็จ! ผลตอบแทนถูกเพิ่มเข้าสู่กระเป๋าเรียบร้อย`);
                                return { assetId: '', amount: 0, timeLeft: 0, isMining: false };
                            }
                            return { ...prev, timeLeft: prev.timeLeft - 1 };
                        });
                    }, 1000);
                }
                return () => clearInterval(timer);
            }, [miningPool.isMining, membershipLevel]);

            // การจัดการฟอร์มเข้าใช้งาน
            const handleRegister = (e) => {
                e.preventDefault();
                if(regForm.password !== regForm.confirmPassword) return alert("รหัสผ่านไม่ตรงกัน");
                const uniqueId = Math.floor(10000000 + Math.random() * 90000000);
                setUser({ name: regForm.name, email: regForm.email, uid: uniqueId });
                setCurrentPage('dashboard');
            };

            const handleLogin = (e) => {
                e.preventDefault();
                const uniqueId = Math.floor(10000000 + Math.random() * 90000000);
                setUser({ name: loginForm.email.split('@')[0], email: loginForm.email, uid: uniqueId });
                setCurrentPage('dashboard');
            };

            // ดึงค่าโครงสีสำหรับนำมาใช้พ่นสีกราฟเวกเตอร์
            const getThemeHex = () => {
                if (chartColorTheme === 'emerald') return '#10b981';
                if (chartColorTheme === 'gold') return '#f59e0b';
                return '#3b82f6';
            };

            return (
                <div className="min-h-screen bg-[#060913] text-gray-100 flex flex-col justify-between relative overflow-x-hidden">
                    
                    {/* TOP NAVIGATION BAR */}
                    {currentPage !== 'auth' && (
                        <div className="bg-[#0f1424] border-b border-gray-800 p-4 flex justify-between items-center sticky top-0 z-40 shadow-md">
                            <button onClick={() => setHamburgerOpen(true)} className="p-2 hover:bg-gray-800 rounded-lg text-blue-500">
                                <i data-lucide="menu"></i>
                            </button>
                            <h1 className="text-xl font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-400">FUNDFUSION BLUEPRINT</h1>
                            <div className="flex items-center gap-2 bg-gray-900 border border-gray-800 px-3 py-1.5 rounded-full text-xs font-semibold text-amber-400 glow-gold">
                                <i data-lucide="shield" className="w-3.5 h-3.5"></i> LV.{membershipLevel}
                            </div>
                        </div>
                    )}

                    {/* HAMBURGER SIDEBAR */}
                    {hamburgerOpen && (
                        <div className="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex">
                            <div className="w-80 premium-gradient h-full p-6 flex flex-col justify-between border-r border-gray-800">
                                <div>
                                    <div className="flex justify-between items-center mb-8">
                                        <div className="flex items-center gap-3">
                                            <div className="w-10 h-10 rounded-full bg-blue-600/20 border border-blue-500 flex items-center justify-center text-blue-400 font-bold glow-blue">
                                                {user?.name?.[0].toUpperCase() || 'U'}
                                            </div>
                                            <div>
                                                <h4 className="font-bold text-sm text-white">{user?.name || 'User'}</h4>
                                                <p className="text-xs text-gray-400">ID: {user?.uid || '00000000'}</p>
                                            </div>
                                        </div>
                                        <button onClick={() => setHamburgerOpen(false)} className="text-gray-400 hover:text-white"><i data-lucide="x"></i></button>
                                    </div>

                                    {/* ควบคุมระบบภาพรวมภายในแถบเมนูข้าง */}
                                    <div className="space-y-4">
                                        <div className="p-3 bg-gray-950 rounded-xl border border-gray-800 space-y-2">
                                            <label className="text-xs font-bold text-gray-400 block">ระดับสมาชิกบัญชี (VIP Blueprint)</label>
                                            <select value={membershipLevel} onChange={(e) => setMembershipLevel(Number(e.target.value))} className="w-full bg-gray-900 text-white text-xs rounded p-2 border border-gray-700 outline-none">
                                                <option value={0}>Level 0 (ไม่ล็อก)</option>
                                                <option value={1}>Level 1 (ล็อกพอร์ตขั้นต่ำ $5,000)</option>
                                                <option value={2}>Level 2 (ล็อกพอร์ตขั้นต่ำ $50,000)</option>
                                                <option value={3}>Level 3 (ล็อกพอร์ตขั้นต่ำ $750,000)</option>
                                                <option value={4}>Level 4 (ล็อกพอร์ตขั้นต่ำ $10,000000)</option>
                                            </select>
                                        </div>

                                        <div className="p-3 bg-gray-950 rounded-xl border border-gray-800 space-y-3">
                                            <div className="flex justify-between items-center text-xs">
                                                <span className="text-gray-400 flex items-center gap-1.5"><i data-lucide="languages" className="w-3.5 h-3.5"></i> ภาษา</span>
                                                <select value={language} onChange={(e) => setLanguage(e.target.value)} className="bg-gray-800 text-white rounded px-2 py-0.5 border border-gray-700">
                                                    <option value="TH">TH</option>
                                                    <option value="EN">EN</option>
                                                </select>
                                            </div>
                                            <div className="flex justify-between items-center text-xs">
                                                <span className="text-gray-400 flex items-center gap-1.5"><i data-lucide="coins" className="w-3.5 h-3.5"></i> สกุลเงิน</span>
                                                <select value={currency} onChange={(e) => setCurrency(e.target.value)} className="bg-gray-800 text-white rounded px-2 py-0.5 border border-gray-700">
                                                    <option value="USD">USD ($)</option>
                                                    <option value="THB">THB (฿)</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <button onClick={() => { setUser(null); setCurrentPage('auth'); setHamburgerOpen(false); }} className="w-full flex items-center justify-center gap-2 bg-red-950/40 hover:bg-red-900/60 text-red-400 py-3 rounded-xl border border-red-900/40 font-medium text-sm">
                                    <i data-lucide="log-out" className="w-4 h-4"></i> ออกจากระบบ
                                </button>
                            </div>
                        </div>
                    )}

                    {/* MAIN APPLICATION FRAME */}
                    <main className="flex-1 p-4 max-w-md w-full mx-auto pb-24">

                        {/* AUTHENTICATION SECTION */}
                        {currentPage === 'auth' && (
                            <div className="pt-12">
                                <div className="text-center mb-10">
                                    <div className="w-16 h-16 bg-blue-600/10 border border-blue-500/30 rounded-3xl flex items-center justify-center mx-auto mb-4 glow-blue">
                                        <i data-lucide="component" className="text-blue-500 w-8 h-8"></i>
                                    </div>
                                    <h2 className="text-3xl font-extrabold tracking-tight text-white mb-2">FundFusion</h2>
                                    <p className="text-xs text-gray-400">ระบบสถาปัตยกรรมพิมพ์เขียวบริหารจัดการพอร์ตสมบูรณ์แบบ</p>
                                </div>

                                {authMode === 'login' ? (
                                    <form onSubmit={handleLogin} className="bg-[#0f1424] border border-gray-800 rounded-3xl p-6 space-y-4 shadow-xl">
                                        <h3 className="text-lg font-bold text-white">เข้าสู่ระบบการจัดการ</h3>
                                        <input type="text" required value={loginForm.email} onChange={(e) => setLoginForm({...loginForm, email: e.target.value})} className="w-full bg-[#060913] border border-gray-800 rounded-xl p-3 text-sm text-white outline-none focus:border-blue-500" placeholder="Email หรือ เบอร์โทรศัพท์" />
                                        <input type="password" required value={loginForm.password} onChange={(e) => setLoginForm({...loginForm, password: e.target.value})} className="w-full bg-[#060913] border border-gray-800 rounded-xl p-3 text-sm text-white outline-none focus:border-blue-500" placeholder="รหัสผ่าน" />
                                        <button type="submit" className="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3.5 rounded-xl text-sm transition glow-blue">เข้าใช้งานระบบ</button>
                                        <p className="text-xs text-center text-gray-400">ยังไม่มีบัญชีในระบบ? <button type="button" onClick={() => setAuthMode('register')} className="text-blue-400 font-semibold underline">ลงทะเบียน</button></p>
                                    </form>
                                ) : (
                                    <form onSubmit={handleRegister} className="bg-[#0f1424] border border-gray-800 rounded-3xl p-6 space-y-4 shadow-xl">
                                        <h3 className="text-lg font-bold text-white">ลงทะเบียนระบบพิมพ์เขียว</h3>
                                        <input type="text" required placeholder="ชื่อบัญชีผู้ใช้" value={regForm.name} onChange={(e) => setRegForm({...regForm, name: e.target.value})} className="w-full bg-[#060913] border border-gray-800 rounded-xl p-3 text-sm text-white outline-none" />
                                        <input type="text" required placeholder="Email หรือ เบอร์โทร" value={regForm.email} onChange={(e) => setRegForm({...regForm, email: e.target.value})} className="w-full bg-[#060913] border border-gray-800 rounded-xl p-3 text-sm text-white outline-none" />
                                        <input type="password" required placeholder="ตั้งรหัสผ่าน" value={regForm.password} onChange={(e) => setRegForm({...regForm, password: e.target.value})} className="w-full bg-[#060913] border border-gray-800 rounded-xl p-3 text-sm text-white outline-none" />
                                        <input type="password" required placeholder="ยืนยันรหัสผ่านอีกครั้ง" value={regForm.confirmPassword} onChange={(e) => setRegForm({...regForm, confirmPassword: e.target.value})} className="w-full bg-[#060913] border border-gray-800 rounded-xl p-3 text-sm text-white outline-none" />
                                        <button type="submit" className="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-3.5 rounded-xl text-sm transition glow-emerald">ยืนยันสมัครสมาชิก</button>
                                        <p className="text-xs text-center text-gray-400">มีบัญชีแล้ว? <button type="button" onClick={() => setAuthMode('login')} className="text-blue-400 font-semibold underline">กลับไปเข้าสู่ระบบ</button></p>
                                    </form>
                                )}
                            </div>
                        )}

                        {/* DASHBOARD OVERVIEW */}
                        {currentPage === 'dashboard' && (
                            <div className="space-y-5">
                                <div className="premium-gradient border border-gray-800 rounded-3xl p-6 relative overflow-hidden shadow-2xl glow-blue">
                                    <div className="flex justify-between items-start mb-4">
                                        <div>
                                            <p className="text-xs font-semibold text-gray-400 mb-1 uppercase tracking-wider">สินทรัพย์รวมสุทธิ (Total Portfolio Value)</p>
                                            <h2 className="text-3xl font-black text-white">{curSign}{formatMoney(totalBalance)}</h2>
                                        </div>
                                        <div className="bg-gray-800 px-2.5 py-1 rounded-xl text-[10px] text-gray-400 font-mono">LIVE ENGINE</div>
                                    </div>
                                    <div className="grid grid-cols-3 gap-2 pt-4 border-t border-gray-800/80 text-center">
                                        <div>
                                            <span className="text-[10px] text-gray-400 block mb-0.5">ยอดฝากหลัก</span>
                                            <span className="font-bold text-sm text-gray-200">{curSign}{formatMoney(wallet.deposited)}</span>
                                        </div>
                                        <div>
                                            <span className="text-[10px] text-gray-400 block mb-0.5">เงินในพอร์ตเทรด</span>
                                            <span className="font-bold text-sm text-blue-400">{curSign}{formatMoney(wallet.tradeBalance)}</span>
                                        </div>
                                        <div>
                                            <span className="text-[10px] text-gray-400 block mb-0.5">มูลค่าถือครอง</span>
                                            <span className="font-bold text-sm text-amber-400">{curSign}{formatMoney(totalAssetValue)}</span>
                                        </div>
                                    </div>
                                </div>

                                {/* ฟังก์ชันการทำธุรกรรม (เงินจริง) */}
                                <div className="grid grid-cols-2 gap-3">
                                    <button onClick={() => {
                                        setWallet(w => ({ ...w, deposited: w.deposited + 1000 }));
                                        alert("ฝากเงินเข้าระบบเรียบร้อยจำนวน $1,000 ผ่านเกตเวย์ด่วน เครือข่าย TRC20/ERC20");
                                    }} className="bg-gray-900/60 border border-gray-800 p-4 rounded-2xl flex flex-col items-center gap-2 hover:border-blue-500 transition">
                                        <i data-lucide="arrow-down-to-line" className="text-blue-400 w-5 h-5"></i>
                                        <span className="text-xs font-bold">ฝากเงินเข้าระบบ</span>
                                    </button>
                                    <button onClick={() => {
                                        if (wallet.deposited < 500) return alert("ยอดเงินฝากหมุนเวียนหลักมีไม่เพียงพอสำหรับการทำรายการถอนขั้นต่ำ");
                                        setWallet(w => ({ ...w, deposited: w.deposited - 500 }));
                                        alert("ทำรายการถอนเงินเรียบร้อย เงินกำลังถูกโอนไปยังที่อยู่กระเป๋าเป้าหมาย");
                                    }} className="bg-gray-900/60 border border-gray-800 p-4 rounded-2xl flex flex-col items-center gap-2 hover:border-red-500 transition">
                                        <i data-lucide="arrow-up-from-line" className="text-red-400 w-5 h-5"></i>
                                        <span className="text-xs font-bold">ถอนเงินออก</span>
                                    </button>
                                </div>

                                {/* แสดงรายการสินทรัพย์ที่ถือครองอย่างละเอียด */}
                                <div className="bg-[#0f1424] border border-gray-800 rounded-2xl p-4 space-y-3">
                                    <h4 className="text-xs font-bold text-gray-400 uppercase tracking-wider">บัญชีแจกแจงการถือครองสินทรัพย์</h4>
                                    {INITIAL_ASSETS.map(asset => {
                                        const amount = wallet.assetsHoldings[asset.id] || 0;
                                        const value = amount * asset.price;
                                        return (
                                            <div key={asset.id} className="flex justify-between items-center bg-black/30 p-3 rounded-xl border border-gray-800/60">
                                                <div>
                                                    <span className="font-bold text-sm text-white">{asset.name} ({asset.symbol})</span>
                                                    <span className="block text-xs text-gray-400">จำนวน: {amount.toFixed(4)} {asset.symbol}</span>
                                                </div>
                                                <span className="font-mono text-sm font-bold text-amber-400">{curSign}{formatMoney(value)}</span>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {/* TRADING MODE + FUNCTION COLOR CHART */}
                        {currentPage === 'trade' && (
                            <div className="space-y-4 animate-fade-in">
                                {/* เลือกประเภทสินทรัพย์ที่จะเทรด */}
                                <div className="bg-gray-900 border border-gray-800 rounded-2xl p-3">
                                    <div className="grid grid-cols-3 gap-2">
                                        {INITIAL_ASSETS.map(asset => (
                                            <button key={asset.id} onClick={() => setSelectedAsset(asset)} className={`p-3 rounded-xl border text-left transition ${selectedAsset.id === asset.id ? 'bg-blue-950/30 border-blue-500 shadow-sm' : 'bg-black/30 border-gray-800'}`}>
                                                <span className="text-[10px] text-gray-400 block">{asset.symbol}/USDT</span>
                                                <span className="text-xs font-bold text-white">${asset.price.toLocaleString()}</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* แผงควบคุมระบบฟังก์ชันสีสันหน้ากราฟ (Chart Color Palette Module) */}
                                <div className="bg-gray-900 border border-gray-800 p-3 rounded-xl flex items-center justify-between">
                                    <span className="text-xs font-bold text-gray-400 flex items-center gap-1.5">
                                        <i data-lucide="palette" className="w-3.5 h-3.5 text-blue-400"></i> ปรับสไตล์สีสันพรีเมียมหน้ากราฟ:
                                    </span>
                                    <div className="flex gap-2">
                                        <button onClick={() => setChartColorTheme('blue')} className={`w-6 h-6 rounded-full bg-blue-500 border-2 ${chartColorTheme === 'blue' ? 'border-white scale-110 shadow-md' : 'border-transparent'}`}></button>
                                        <button onClick={() => setChartColorTheme('emerald')} className={`w-6 h-6 rounded-full bg-emerald-500 border-2 ${chartColorTheme === 'emerald' ? 'border-white scale-110 shadow-md' : 'border-transparent'}`}></button>
                                        <button onClick={() => setChartColorTheme('gold')} className={`w-6 h-6 rounded-full bg-amber-500 border-2 ${chartColorTheme === 'gold' ? 'border-white scale-110 shadow-md' : 'border-transparent'}`}></button>
                                    </div>
                                </div>

                                {/* หน้าจอกราฟและเส้นเทรนด์พรีเมียมเรืองแสงตามฟังก์ชันสีที่เลือก */}
                                <div className={`bg-[#0f1424] border border-gray-800 rounded-3xl p-5 space-y-4 shadow-xl relative transition-all duration-300 ${chartColorTheme === 'blue' ? 'glow-blue' : chartColorTheme === 'emerald' ? 'glow-emerald' : 'glow-gold'}`}>
                                    <div className="flex justify-between items-center">
                                        <div className="flex items-center gap-2">
                                            <div className={`w-2.5 h-2.5 rounded-full animate-pulse ${chartColorTheme === 'blue' ? 'bg-blue-500' : chartColorTheme === 'emerald' ? 'bg-emerald-500' : 'bg-amber-500'}`}></div>
                                            <h4 className="font-bold text-sm text-white">{selectedAsset.name} พิมพ์เขียวกราฟเรียลไทม์</h4>
                                        </div>
                                        <span className={`text-xs font-mono font-bold px-2 py-0.5 rounded ${selectedAsset.change >= 0 ? 'text-emerald-400 bg-emerald-950/50' : 'text-red-400 bg-red-950/50'}`}>{selectedAsset.change}%</span>
                                    </div>

                                    {/* SVG LIVE PREMIUM GRAPH */}
                                    <div className="h-44 bg-[#060913] rounded-2xl border border-gray-800/80 relative overflow-hidden flex items-center justify-center">
                                        <svg className="w-full h-full absolute inset-0" viewBox="0 0 100 100" preserveAspectRatio="none">
                                            <defs>
                                                <linearGradient id="dynamicGradient" x1="0" y1="0" x2="0" y2="1">
                                                    <stop offset="0%" stopColor={getThemeHex()} stopOpacity="0.4"></stop>
                                                    <stop offset="100%" stopColor={getThemeHex()} stopOpacity="0"></stop>
                                                </linearGradient>
                                            </defs>
                                            {/* พื้นที่เงาสีไล่ระดับใต้เส้นกราฟ */}
                                            <path d="M 0 85 Q 20 30, 40 65 T 75 35 T 100 50 L 100 100 L 0 100 Z" fill="url(#dynamicGradient)"></path>
                                            {/* เส้นหลักกราฟวิ่งเคลื่อนไหวเรืองแสง */}
                                            <path d="M 0 85 Q 20 30, 40 65 T 75 35 T 100 50" fill="none" stroke={getThemeHex()} strokeWidth="3" className="chart-line-anim"></path>
                                        </svg>
                                        <div className="absolute top-2 left-3 text-[9px] text-gray-600 font-mono">จุดสูงสุด: ${(selectedAsset.price * 1.03).toFixed(2)}</div>
                                        <div className="absolute bottom-2 left-3 text-[9px] text-gray-600 font-mono">จุดต่ำสุด: ${(selectedAsset.price * 0.97).toFixed(2)}</div>
                                    </div>
                                    
                                    {/* ฟอร์มเปิดตั๋วออร์เดอร์ */}
                                    <div className="grid grid-cols-2 gap-3 text-xs">
                                        <div>
                                            <label className="text-gray-400 block mb-1">จำนวนเงินที่จะออกไม้ ($)</label>
                                            <input type="number" defaultValue="200" id="tradeAmountField" className="w-full bg-[#060913] border border-gray-800 rounded-lg p-2.5 text-white outline-none focus:border-blue-500" />
                                        </div>
                                        <div>
                                            <label className="text-gray-400 block mb-1">ตั้งจุดทำกำไรอัตโนมัติ (TP)</label>
                                            <input type="number" placeholder="ไม่บังคับตั้งค่า" className="w-full bg-[#060913] border border-gray-800 rounded-lg p-2.5 text-white outline-none" />
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-3 pt-2">
                                        <button onClick={() => {
                                            const amt = parseFloat(document.getElementById('tradeAmountField').value || 0);
                                            if(wallet.tradeBalance < amt) return alert("ยอดวงเงินสำหรับใช้เทรดมีไม่เพียงพอสำหรับการออกตั๋วไม้นี้");
                                            setWallet(w => ({ ...w, tradeBalance: w.tradeBalance - amt }));
                                            setOrders([...orders, { id: Date.now(), asset: selectedAsset, type: 'BUY', volume: amt, status: 'RUNNING' }]);
                                            alert("จับคู่คำสั่งเปิดสัญญา BUY มาร์จิ้นเรียบร้อย!");
                                        }} className="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl text-sm transition glow-emerald">เปิดคำสั่ง BUY</button>
                                        
                                        <button onClick={() => {
                                            const amt = parseFloat(document.getElementById('tradeAmountField').value || 0);
                                            if(wallet.tradeBalance < amt) return alert("ยอดวงเงินสำหรับใช้เทรดมีไม่เพียงพอสำหรับการออกตั๋วไม้นี้");
                                            setWallet(w => ({ ...w, tradeBalance: w.tradeBalance - amt }));
                                            setOrders([...orders, { id: Date.now(), asset: selectedAsset, type: 'SELL', volume: amt, status: 'RUNNING' }]);
                                            alert("จับคู่คำสั่งเปิดสัญญา SELL มาร์จิ้นเรียบร้อย!");
                                        }} className="bg-red-600 hover:bg-red-500 text-white font-bold py-3 rounded-xl text-sm transition">เปิดคำสั่ง SELL</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ORDER MANAGEMENT HISTORY */}
                        {currentPage === 'orders' && (
                            <div className="space-y-4">
                                <h3 className="font-bold text-sm text-white">ตั๋วสัญญาซื้อขายที่กำลังเปิดทำงาน (Running Margin Status)</h3>
                                {orders.filter(o => o.status === 'RUNNING').length === 0 ? (
                                    <p className="text-xs text-gray-500 text-center py-6">ไม่มีออร์เดอร์ที่ค้างอยู่ในระบบขณะนี้</p>
                                ) : (
                                    orders.filter(o => o.status === 'RUNNING').map(order => (
                                        <div key={order.id} className="bg-[#0f1424] border border-gray-800 rounded-2xl p-4 flex justify-between items-center shadow-lg">
                                            <div>
                                                <span className={`text-[10px] px-2 py-0.5 rounded font-bold mr-2 ${order.type === 'BUY' ? 'bg-emerald-950 text-emerald-400' : 'bg-red-950 text-red-400'}`}>{order.type}</span>
                                                <span className="font-bold text-white text-sm">{order.asset.name}</span>
                                                <span className="block text-xs text-gray-400 mt-1">มูลค่าออร์เดอร์: ${order.volume}</span>
                                            </div>
                                            <button onClick={() => {
                                                if(confirm("คุณต้องการปิดสัญญาตั๋วนี้เพื่อคำนวณกำไร/ขาดทุนเข้ากระเป๋าเทรดหลักหรือไม่?")) {
                                                    setWallet(w => ({ ...w, tradeBalance: w.tradeBalance + (order.volume * 1.04) }));
                                                    setOrders(orders.map(o => o.id === order.id ? { ...o, status: 'CLOSED' } : o));
                                                    alert("ปิดออร์เดอร์และตัดยอดเข้ากระเป๋าเงินเทรดเรียบร้อย");
                                                }
                                            }} className="bg-gray-800 hover:bg-gray-700 text-xs text-gray-200 px-3 py-2 rounded-xl border border-gray-700 transition">ปิดสัญญานี้</button>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}

                        {/* ASSET SPOT ACCUMULATION & FREEZE LOCK DETECTOR */}
                        {currentPage === 'assets' && (
                            <div className="space-y-4">
                                <div className="bg-[#0f1424] border border-gray-800 rounded-3xl p-5 space-y-4">
                                    <div className="flex justify-between items-center border-b border-gray-800 pb-3">
                                        <h3 className="font-bold text-sm text-white">ซื้อสะสมสินทรัพย์ (Spot Vault Platform)</h3>
                                        {isAssetLocked && (
                                            <span className="text-[10px] bg-red-950 text-red-400 border border-red-900/50 px-2 py-0.5 rounded-full font-bold flex items-center gap-1">
                                                <i data-lucide="lock" className="w-2.5 h-2.5"></i> ตรวจพบสถานะล็อก
                                            </span>
                                        )}
                                    </div>
                                    
                                    <div>
                                        <label className="text-xs text-gray-400 block mb-1">เลือกสินทรัพย์ปลายทาง</label>
                                        <select onChange={(e) => setSelectedAsset(INITIAL_ASSETS.find(a => a.id === e.target.value))} className="w-full bg-[#060913] border border-gray-800 rounded-xl p-3 text-sm text-white outline-none">
                                            {INITIAL_ASSETS.map(a => <option key={a.id} value={a.id}>{a.name} ({a.symbol})</option>)}
                                        </select>
                                    </div>

                                    <div>
                                        <label className="text-xs text-gray-400 block mb-1">ระบุจำนวนเงินลงทุนในการแลกซื้อ ($)</label>
                                        <input type="number" id="spotBuyAmountInput" placeholder="จำนวนเงินทุนหน่วยดอลลาร์" className="w-full bg-[#060913] border border-gray-800 rounded-xl p-3 text-sm text-white outline-none" />
                                    </div>

                                    <div className="grid grid-cols-2 gap-3 pt-2">
                                        <button onClick={() => {
                                            const amt = parseFloat(document.getElementById('spotBuyAmountInput').value || 0);
                                            if (wallet.deposited < amt) return alert("ยอดวงเงินเงินฝากหลักในกระเป๋าไม่เพียงพอสำหรับการแลกซื้อสินทรัพย์");
                                            setWallet(w => ({
                                                ...w,
                                                deposited: w.deposited - amt,
                                                assetsHoldings: { ...w.assetsHoldings, [selectedAsset.id]: (w.assetsHoldings[selectedAsset.id] || 0) + (amt / selectedAsset.price) }
                                            }));
                                            alert("ทำรายการซื้อสะสมเข้าพอร์ตห้องนิรภัยสำเร็จ!");
                                        }} className="bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-xl text-xs font-bold transition glow-blue">ซื้อสะสม (BUY SPOT)</button>
                                        
                                        <button onClick={() => {
                                            // ส่วนควบคุมความปลอดภัยห้ามถอนขายเหรียญตามพิมพ์เขียวคำสั่งผู้ใช้
                                            if (isAssetLocked) {
                                                return alert("🚨 แจ้งเตือนห้ามขายจากระบบรักษาความปลอดภัย: บัญชีคุณติดสถานะล็อกเหรียญชั่วคราวเนื่องจากคุณสมบัติระดับเลเวล (Membership Level) ไม่ผ่านเกณฑ์มูลค่าพอร์ตขั้นต่ำ กรุณาฝากเงินเพิ่มเพื่อปลดล็อกตามเงื่อนไขของสัญญาผูกมัดก่อนทำรายการ");
                                            }
                                            const assetHoldingAmount = wallet.assetsHoldings[selectedAsset.id] || 0;
                                            if(assetHoldingAmount <= 0) return alert("คุณไม่มีจำนวนสินทรัพย์นี้เหลือให้เคลียร์ขายในระบบ");
                                            const cashValue = assetHoldingAmount * selectedAsset.price;
                                            
                                            setWallet(w => ({
                                                ...w,
                                                assetsHoldings: { ...w.assetsHoldings, [selectedAsset.id]: 0 },
                                                tradeBalance: w.tradeBalance + cashValue
                                            }));
                                            alert("ชำระขายคืนสินทรัพย์ทั้งหมดในพอร์ตกลับเข้าสู่กระเป๋าเทรดหลักเรียบร้อย!");
                                        }} className="bg-red-950/50 hover:bg-red-950 border border-red-900/60 text-red-400 py-3 rounded-xl text-xs font-bold transition">ขายทั้งหมด (SELL ALL)</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 24H MINING ENGINE LOOP */}
                        {currentPage === 'mining' && (
                            <div className="space-y-4">
                                <div className="bg-[#0f1424] border border-gray-800 rounded-3xl p-6 text-center space-y-4 shadow-xl">
                                    <div className="mx-auto w-12 h-12 bg-indigo-600/10 border border-indigo-500/30 rounded-2xl flex items-center justify-center text-indigo-400">
                                        <i data-lucide="cpu" className="w-6 h-6 animate-spin"></i>
                                    </div>
                                    <div>
                                        <h3 className="font-bold text-base text-white">เครื่องขุดคลาวด์คอมพิวติ้งอัตโนมัติ</h3>
                                        <p className="text-xs text-gray-400 mt-1">รับผลตอบแทนปันผลเพิ่มสินทรัพย์รายวันตามสัญญาลูป 24 ชั่วโมง</p>
                                    </div>

                                    {miningPool.isMining ? (
                                        <div className="bg-black/40 p-4 rounded-2xl border border-gray-800">
                                            <span className="text-[10px] text-gray-500 block mb-1 uppercase tracking-widest">เวลาที่กำลังนับถอยหลังหลอมรวมธาตุ</span>
                                            <h2 className="text-3xl font-mono text-blue-400 font-bold animate-pulse">00:00:0{miningPool.timeLeft}</h2>
                                        </div>
                                    ) : (
                                        <div className="space-y-3 pt-2">
                                            <select id="miningAssetChoice" className="w-full bg-[#060913] border border-gray-800 rounded-xl p-3 text-xs text-white">
                                                {INITIAL_ASSETS.map(a => <option key={a.id} value={a.id}>ฟาร์มเหรียญ {a.name} ({a.symbol})</option>)}
                                            </select>
                                            <button onClick={() => {
                                                const selectedId = document.getElementById('miningAssetChoice').value;
                                                setMiningPool({
                                                    assetId: selectedId,
                                                    amount: 1000, 
                                                    timeLeft: 5, 
                                                    isMining: true
                                                });
                                            }} className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-3 rounded-xl font-bold text-xs transition glow-blue">
                                                สั่งเปิดสวิตช์เริ่มเดินเครื่องกำลังขุด
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* BOTTOM TAB BAR NAVIGATION */}
                    {currentPage !== 'auth' && (
                        <nav className="fixed bottom-0 left-0 right-0 bg-[#0f1424]/95 border-t border-gray-800 max-w-md mx-auto rounded-t-3xl shadow-xl flex justify-around p-3 z-40 backdrop-blur-md">
                            {[
                                { id: 'dashboard', icon: 'wallet', label: 'แดชบอร์ด' },
                                { id: 'trade', icon: 'trending-up', label: 'หน้าจอเทรด' },
                                { id: 'orders', icon: 'history', label: 'ตั๋วสัญญา' },
                                { id: 'assets', icon: 'gem', label: 'คลังสินทรัพย์' },
                                { id: 'mining', icon: 'cpu', label: 'คลาวด์ขุด' },
                            ].map((tab) => (
                                <button key={tab.id} onClick={() => { setCurrentPage(tab.id); setHamburgerOpen(false); }} className={`flex flex-col items-center gap-1 transition ${currentPage === tab.id ? 'text-blue-500 scale-105' : 'text-gray-400 hover:text-gray-200'}`}>
                                    <i data-lucide={tab.icon} className="w-5 h-5"></i>
                                    <span className="text-[10px] font-medium">{tab.label}</span>
                                </button>
                            ))}
                        </nav>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        // โหลดไอคอนและรีเฟรชเมื่อแอปทำงาน
        setTimeout(() => { lucide.createIcons(); }, 500);
    </script>
</body>
</html>
